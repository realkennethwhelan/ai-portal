<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #21253a;
      --border: #2e3356;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --text: #e2e8f0;
      --muted: #8892b0;
      --tag-bg: #1e2240;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0f1117 0%, #1a1d2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .tagline { color: var(--muted); font-size: .85rem; margin-bottom: 16px; }

    /* Search */
    .search-wrap {
      display: flex;
      max-width: 560px;
      margin: 0 auto;
      gap: 8px;
    }
    #searchInput {
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    /* ── Nav tabs ── */
    .nav-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .nav-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .83rem;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid transparent;
      transition: all .2s;
      background: none;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); background: var(--surface); }
    .nav-tab.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ── Main ── */
    main { max-width: 1300px; margin: 0 auto; padding: 24px 20px 60px; }

    .section { margin-bottom: 32px; }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon { font-size: 1.2rem; }
    .section-count {
      margin-left: auto;
      font-size: .75rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      background: linear-gradient(135deg, #6366f120, #a855f710);
      transition: opacity .2s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px #6366f122; }
    .card:hover::before { opacity: 1; }

    .card-emoji {
      font-size: 1.8rem;
      line-height: 1;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--surface2);
    }
    .card-name {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1.3;
    }
    .card-desc {
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    .card-tag {
      font-size: .65rem;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--accent);
      border: 1px solid #6366f130;
    }
    .hot-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: .6rem;
      padding: 1px 6px;
      border-radius: 6px;
      background: linear-gradient(90deg, #ef4444, #f97316);
      color: #fff;
      font-weight: 700;
    }
    .new-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: .6rem;
      padding: 1px 6px;
      border-radius: 6px;
      background: linear-gradient(90deg, #10b981, #059669);
      color: #fff;
      font-weight: 700;
    }

    /* ── No results ── */
    #noResults {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }
    #noResults .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: .8rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* Hidden */
    .hidden { display: none !important; }
  </style>
</head>

// ── Category metadata ──
const CATS = {
  chat:   { label: "💬 对话助手", icon: "💬" },
  cn:     { label: "🇨🇳 国内平台", icon: "🇨🇳" },
  image:  { label: "🎨 图像生成", icon: "🎨" },
  video:  { label: "🎬 视频生成", icon: "🎬" },
  code:   { label: "💻 编程开发", icon: "💻" },
  search: { label: "🔍 AI 搜索",  icon: "🔍" },
  audio:  { label: "🎵 音频音乐", icon: "🎵" },
  write:  { label: "✍️ 写作办公", icon: "✍️" },
  design: { label: "🖌️ 设计创意", icon: "🖌️" },
  agent:  { label: "🤖 AI 智能体", icon: "🤖" },
};

let currentCat = "all";
let query = "";

function render() {
  const sections = document.getElementById("sections");
  const noResults = document.getElementById("noResults");
  sections.innerHTML = "";

  const q = query.trim().toLowerCase();

  // Filter
  const filtered = DATA.filter(item => {
    const matchCat = currentCat === "all" || item.cat === currentCat;
    const matchQ = !q || item.name.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) || (item.tag && item.tag.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  // Group by cat
  const groups = {};
  filtered.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });

  // Render in cat order
  const order = ["chat", "cn", "image", "video", "code", "search", "audio", "write", "design", "agent"];
  order.forEach(cat => {
    if (!groups[cat]) return;
    const meta = CATS[cat];
    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `
      <div class="section-title">
        <span class="section-icon">${meta.icon}</span>
        ${meta.label}
        <span class="section-count">${groups[cat].length} 个工具</span>
      </div>
      <div class="card-grid" id="grid-${cat}"></div>
    `;
    sections.appendChild(sec);

    const grid = sec.querySelector(`#grid-${cat}`);
    groups[cat].forEach(item => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = item.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.innerHTML = `
        ${item.hot ? '<span class="hot-badge">HOT</span>' : ""}
        ${item.isNew ? '<span class="new-badge">NEW</span>' : ""}
        <div class="card-emoji">${item.emoji}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        ${item.tag ? `<span class="card-tag">${item.tag}</span>` : ""}
      `;
      grid.appendChild(a);
    });
  });
}

// Nav tabs
document.getElementById("navTabs").addEventListener("click", e => {
  const tab = e.target.closest(".nav-tab");
  if (!tab) return;
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentCat = tab.dataset.cat;
  render();
});

// Search
document.getElementById("searchInput").addEventListener("input", e => {
  query = e.target.value;
  currentCat = "all";
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  document.querySelector('[data-cat="all"]').classList.add("active");
  render();
});

render();
</script>
